<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote Confirmed | Culinary Block Collective</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:        #2D6A4F;
      --dgreen:       #1B4332;
      --lgreen:       #EDF5EE;
      --lgreen2:      #F2F9F3;
      --gold:         #C9992A;
      --gold-light:   #ECD97A;
      --lgold:        #FAF4E1;
      --cream:        #FAFAF8;
      --cream2:       #F4F1EB;
      --border:       #E5E0D8;
      --text:         #1A1814;
      --muted:        #6B6560;
      --white:        #FFFFFF;
      --radius:       8px;
      --shadow:       0 2px 20px rgba(0,0,0,0.07);
      --shadow-lg:    0 8px 48px rgba(0,0,0,0.11);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Inter', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-body); color: var(--text); background: var(--cream); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* ── UTILITY ── */
    .container { max-width: 1120px; margin: 0 auto; padding: 0 32px; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--white);
      padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      height: 68px;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 12px rgba(0,0,0,0.06);
    }
    .nav-logo {
      font-family: var(--font-display); color: var(--dgreen);
      font-weight: 600; font-size: 1.25rem; letter-spacing: .02em; flex-shrink: 0;
    }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; align-items: center; gap: 2px; margin: 0 16px; }
    .nav-link {
      color: var(--muted); font-size: 0.875rem; font-weight: 500;
      padding: 6px 12px; border-radius: 4px;
      transition: color .15s, background .15s;
    }
    .nav-link:hover { color: var(--dgreen); background: var(--lgreen2); }
    .nav-phone {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
      color: var(--gold);
      font-family: var(--font-body); font-weight: 700; font-size: 0.875rem; padding: 10px 20px;
      border-radius: 6px; transition: color .15s;
    }
    .nav-phone:hover { color: #b8891e; }
    .nav-phone svg { width: 15px; height: 15px; }
    .nav-burger {
      display: none; flex-direction: column; justify-content: center;
      gap: 5px; background: none; border: none; cursor: pointer; padding: 8px;
    }
    .nav-burger span {
      display: block; width: 22px; height: 2px;
      background: var(--dgreen); border-radius: 2px;
      transition: transform .2s, opacity .2s;
    }
    .nav-burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-burger.open span:nth-child(2) { opacity: 0; }
    .nav-burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .nav-drawer {
      display: none; position: fixed; top: 68px; left: 0; right: 0;
      background: var(--white); border-top: 1px solid var(--border);
      z-index: 99; padding: 12px 16px 20px; flex-direction: column; gap: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    }
    .nav-drawer.open { display: flex; }
    .nav-drawer .nav-link { padding: 10px 14px; font-size: 0.95rem; border-radius: 6px; }
    .nav-drawer .nav-phone-mob {
      display: flex; align-items: center; gap: 8px;
      background: var(--dgreen); color: var(--white);
      font-weight: 600; font-size: 0.95rem; padding: 12px 14px;
      border-radius: 6px; margin-top: 8px; justify-content: center;
    }

    /* ── MAIN ── */
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 80px 32px; }

    /* ── CONFIRMATION CARD ── */
    .confirm-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 52px 48px;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .confirm-icon {
      width: 64px; height: 64px;
      background: var(--lgreen);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
    }
    .confirm-icon svg { width: 32px; height: 32px; color: var(--green); }
    .section-label {
      display: inline-block; font-size: 0.72rem; font-weight: 700;
      letter-spacing: .16em; text-transform: uppercase;
      color: var(--green); background: var(--lgreen);
      padding: 5px 16px; border-radius: 2px; margin-bottom: 16px;
    }
    .confirm-heading {
      font-family: var(--font-display);
      font-size: clamp(1.9rem, 4vw, 2.6rem);
      font-weight: 600; line-height: 1.15; color: var(--dgreen);
      margin-bottom: 14px; letter-spacing: -0.01em;
    }
    .confirm-sub {
      font-size: 0.975rem; color: var(--muted); line-height: 1.7;
      margin-bottom: 36px;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--gold); color: var(--dgreen);
      font-weight: 700; font-size: 1rem; padding: 16px 36px;
      border-radius: 6px; border: none; cursor: pointer;
      transition: transform .15s, background .15s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.13);
      text-decoration: none;
    }
    .btn-primary:hover { transform: translateY(-1px); background: #b8891e; }
    .btn-primary:focus-visible { outline: 3px solid var(--gold-light); outline-offset: 3px; }
    .confirm-note {
      margin-top: 20px;
      font-size: 0.8rem; color: var(--muted); line-height: 1.6;
    }
    .confirm-divider {
      border: none; border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    .confirm-help {
      font-size: 0.875rem; color: var(--muted);
    }
    .confirm-help a {
      color: var(--green); font-weight: 600;
      transition: color .15s;
    }
    .confirm-help a:hover { color: var(--dgreen); }

    /* ── ERROR STATE ── */
    .error-card {
      background: var(--white);
      border: 1px solid #f0c0b0;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .error-icon {
      width: 56px; height: 56px;
      background: #FEF2F0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 1.5rem;
    }
    .error-heading {
      font-family: var(--font-display);
      font-size: 1.8rem; font-weight: 600; color: var(--dgreen);
      margin-bottom: 12px;
    }
    .error-sub { font-size: 0.925rem; color: var(--muted); line-height: 1.7; margin-bottom: 28px; }
    .btn-outline {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1.5px solid var(--green); color: var(--green);
      font-weight: 600; font-size: 0.9rem; padding: 12px 24px;
      border-radius: 6px; transition: background .15s, color .15s;
      text-decoration: none;
    }
    .btn-outline:hover { background: var(--green); color: var(--white); }

    /* ── FOOTER ── */
    footer { background: #0D2118; padding: 36px 32px; text-align: center; }
    .footer-logo {
      font-family: var(--font-body); font-size: 1rem; font-weight: 600;
      color: var(--white); margin-bottom: 10px;
    }
    .footer-logo span { color: var(--gold); }
    .footer-copy { font-size: 0.75rem; color: rgba(255,255,255,0.28); margin-top: 8px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .nav-links { display: none; }
      .nav-burger { display: flex; }
      .nav-phone { font-size: 0; padding: 9px 12px; border-radius: 6px; }
      .nav-phone svg { width: 18px; height: 18px; }
    }
    @media (max-width: 600px) {
      main { padding: 48px 20px; }
      .confirm-card { padding: 36px 24px; }
      .error-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="/">Culinary Block <span>Collective</span></a>
  <div class="nav-links">
    <a class="nav-link" href="/#menus">Our Chefs</a>
    <a class="nav-link" href="/#pricing">Pricing</a>
    <a class="nav-link" href="/#faq">FAQ</a>
    <a class="nav-link" href="/programs" style="color:var(--green);font-weight:600;">Corporate Programs</a>
  </div>
  <a class="nav-phone" href="tel:+14156994397" aria-label="Call us">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
    </svg>
    (415) 699-4397
  </a>
  <button class="nav-burger" id="nav-burger" aria-label="Open menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="nav-drawer" id="nav-drawer">
  <a class="nav-link" href="/#menus"   onclick="closeDrawer()">Our Chefs</a>
  <a class="nav-link" href="/#pricing" onclick="closeDrawer()">Pricing</a>
  <a class="nav-link" href="/#faq"     onclick="closeDrawer()">FAQ</a>
  <a class="nav-link" href="/programs" onclick="closeDrawer()" style="color:var(--green);font-weight:600;">Corporate Programs</a>
  <a class="nav-phone-mob" href="tel:+14156994397">📞 (415) 699-4397</a>
</div>

<!-- MAIN -->
<main id="main-content">
  <!-- populated by JS below -->
</main>

<!-- FOOTER -->
<footer>
  <p class="footer-logo">Culinary Block <span>Collective</span></p>
  <p class="footer-copy">© 2026 Culinary Block Collective · San Jose, CA</p>
</footer>

<script>
  // Nav burger
  const burger = document.getElementById('nav-burger');
  const drawer = document.getElementById('nav-drawer');
  burger.addEventListener('click', () => {
    const open = drawer.classList.toggle('open');
    burger.classList.toggle('open', open);
    burger.setAttribute('aria-expanded', open);
  });
  function closeDrawer() {
    drawer.classList.remove('open');
    burger.classList.remove('open');
    burger.setAttribute('aria-expanded', false);
  }
  document.addEventListener('click', e => {
    if (!burger.contains(e.target) && !drawer.contains(e.target)) closeDrawer();
  });

  // Render confirmation or error state
  (function () {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('invoiceUrl');
    const main = document.getElementById('main-content');

    // Only accept Stripe-hosted invoice URLs
    function isValidStripeInvoiceUrl(url) {
      try {
        const parsed = new URL(url);
        return parsed.protocol === 'https:' &&
          (parsed.hostname === 'invoice.stripe.com' ||
           parsed.hostname.endsWith('.stripe.com'));
      } catch {
        return false;
      }
    }

    if (raw && isValidStripeInvoiceUrl(raw)) {
      main.innerHTML = `
        <div class="confirm-card" role="main">
          <div class="confirm-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <span class="section-label">Invoice Ready</span>
          <h1 class="confirm-heading">Your invoice is confirmed.</h1>
          <p class="confirm-sub">
            We've generated your Stripe invoice with a secure payment link.
            Pay by card or ACH bank transfer — no account required.
            Your invoice has also been emailed to you for your records.
          </p>
          <a class="btn-primary" href="${raw}" target="_blank" rel="noopener noreferrer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
              <line x1="1" y1="10" x2="23" y2="10"/>
            </svg>
            Pay Now
          </a>
          <p class="confirm-note">
            Opens Stripe's secure payment page in a new tab.
            Net 30 terms apply — pay by card or ACH bank transfer.
          </p>
          <hr class="confirm-divider" />
          <p class="confirm-help">
            Questions about your order?
            <a href="tel:+14156994397">(415) 699-4397</a> &nbsp;·&nbsp;
            <a href="mailto:culinaryblockcatering@gmail.com">culinaryblockcatering@gmail.com</a>
          </p>
        </div>`;
    } else {
      main.innerHTML = `
        <div class="error-card" role="main">
          <div class="error-icon" aria-hidden="true">⚠️</div>
          <h1 class="error-heading">Link not found</h1>
          <p class="error-sub">
            This confirmation link is missing or invalid.
            Check the email we sent you for your invoice link,
            or contact us and we'll resend it right away.
          </p>
          <a class="btn-outline" href="/">Back to Home</a>
        </div>`;
    }
  })();
</script>

</body>
</html>
